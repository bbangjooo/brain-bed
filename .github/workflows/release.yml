name: Release

on:
  push:
    branches:
      - main

jobs:
  check-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --ignore-engines

      - name: Bump version and tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if git tag -l "v${CURRENT_VERSION}" | grep -q .; then
            NEW_VERSION=$(npm version patch --no-git-tag-version)
          else
            NEW_VERSION="v${CURRENT_VERSION}"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update landing page version and download URL
          VERSION_NUM=${NEW_VERSION#v}
          sed -i '' "s|v[0-9]*\.[0-9]*\.[0-9]* &middot; Apple Silicon|${NEW_VERSION} \&middot; Apple Silicon|g" landing/index.html
          sed -i '' "s|Brain-Bed-[0-9]*\.[0-9]*\.[0-9]*-arm64\.dmg|Brain-Bed-${VERSION_NUM}-arm64.dmg|g" landing/index.html

          git add package.json package-lock.json landing/index.html
          git commit -m "release: $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          git push origin main --tags

      - name: Import code signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx vite build && npx electron-builder --mac --publish always

      - name: Sign, notarize, and re-upload DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for dmg in dist/*.dmg; do
            echo "Signing $dmg..."
            codesign --force --sign "Developer ID Application: seungwook seo (Y6M44N2QCD)" "$dmg"
            echo "Notarizing $dmg..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            echo "Stapling $dmg..."
            xcrun stapler staple "$dmg"
            echo "Re-uploading $dmg..."
            gh release upload "$VERSION" "$dmg" --clobber
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ steps.version.outputs.version }} --draft=false --latest

  deploy-landing:
    needs: check-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  update-badge:
    needs: check-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update download count badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh api repos/bbangjooo/brain-bed/releases --jq '[.[].assets[] | select(.name | endswith(".dmg")) | select(.name | contains("blockmap") | not) | .download_count] | add // 0')
          echo "{\"schemaVersion\":1,\"label\":\"Downloads\",\"message\":\"${TOTAL}\",\"color\":\"blue\"}" > landing/badge/downloads.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/badge/downloads.json
          git diff --cached --quiet || git commit -m "chore: update download badge [skip ci]" && git push
