name: Update Download Badge

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 (KST 09:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update download count badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh api repos/bbangjooo/brain-bed/releases --jq '[.[] | select(.tag_name | ltrimstr("v") | split(".") | map(tonumber) | . as [$maj,$min,$pat] | $maj > 1 or ($maj == 1 and $min > 0) or ($maj == 1 and $min == 0 and $pat >= 0)) | .assets[] | select(.name | endswith(".dmg")) | select(.name | contains("blockmap") | not) | .download_count] | add // 0')
          echo "{\"schemaVersion\":1,\"label\":\"Downloads\",\"message\":\"${TOTAL}\",\"color\":\"blue\"}" > landing/badge/downloads.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/badge/downloads.json
          git diff --cached --quiet || git commit -m "chore: update download badge [skip ci]" && git push
