name: Release

on:
  push:
    branches:
      - main

jobs:
  check-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --ignore-engines

      - name: Bump version and tag
        id: version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update landing page version and download URL
          VERSION_NUM=${NEW_VERSION#v}
          sed -i '' "s|v[0-9]*\.[0-9]*\.[0-9]* &middot; Apple Silicon|${NEW_VERSION} \&middot; Apple Silicon|g" landing/index.html
          sed -i '' "s|Brain-Bed-[0-9]*\.[0-9]*\.[0-9]*-arm64\.dmg|Brain-Bed-${VERSION_NUM}-arm64.dmg|g" landing/index.html

          git add package.json package-lock.json landing/index.html
          git commit -m "release: $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          git push origin main --tags

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --mac --publish always

  deploy-landing:
    needs: check-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: landing
          vercel-args: --prod
